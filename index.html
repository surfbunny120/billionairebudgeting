<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billionaire Budgeting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            color: #1a1a1a;
            background: #ffffff;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .header-gif {
            width: 100%;
            max-width: 700px;
            margin: 0 auto 48px;
            display: block;
            border-radius: 8px;
        }

        .intro-text {
            font-size: 2.8rem;
            font-weight: 900;
            color: #071EF6;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fc00f9;
            line-height: 1.2;
            margin-bottom: 48px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #fc00f9;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h3 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fc00f9;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .start-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 16px;
            padding: 18px 20px;
            background: #071ef6;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-howto {
            background: #28FF35;
            color: #FC00F9;
        }

        .btn-copy {
            background: #071EF6;
            color: #29FFFD;
        }

        .btn-start {
            background: #FFFD3F;
            color: #071EF6;
        }

        .start-btn:hover {
            opacity: 0.85;
        }

        footer {
            padding: 40px 24px;
            border-top: 1px solid #e5e5e5;
            color: #666;
            font-size: 0.95rem;
        }

        footer a {
            color: #071ef6;
            text-decoration: underline;
        }

        footer a:hover {
            color: #fc00f9;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.4rem;
            }

            h3 {
                font-size: 1.2rem;
            }

            .container {
                padding: 40px 16px;
            }

            .start-btn {
                padding: 16px 20px;
                font-size: 1.2rem;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="header.gif" alt="Billionaire Budgeting" class="header-gif">

        <p class="intro-text">Let's play the game of&hellip;</p>
        <h1>Billionaire Budgeting!</h1>

        <a href="#" class="start-btn btn-howto">How to play!</a>

        <a href="https://docs.google.com/spreadsheets/d/1Z3dC0YBqI3LnZq9k7Fehm7EXHqi52vPi3DKn_xd5REA/edit?gid=212400786#gid=212400786" target="_blank" rel="noopener" class="start-btn btn-start">START!</a>
    </div>

    <footer>
        <p>See more @ <a href="https://llcprojects.com" target="_blank" rel="noopener">llcprojects.com</a></p>
    </footer>

</body>
</html>
